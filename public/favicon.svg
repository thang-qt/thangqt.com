<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Circle outline -->
  <circle cx="16" cy="16" r="14" class="stroke"/>
  <!-- D shape in left half: same height as circle, curves right -->
  <path d="M2 2 L2 30 A14 14 0 0 0 2 2 Z" class="fill"/>
  <style>
    .stroke { fill: none; stroke: #000; stroke-width: 1.5; }
    .fill { fill: #000; }
    @media (prefers-color-scheme: dark) {
      .stroke { stroke: #FFF; }
      .fill { fill: #FFF; }
    }
  </style>
</svg>
